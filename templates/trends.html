{% extends "base.html" %}
{% set active_page = 'trends' %}
{% block title %}统计趋势 - Baby Tracker{% endblock %}

{% block content %}
<div class="space-y-5 fade-in">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-semibold">统计趋势</h1>
        <div class="flex items-center gap-2">
            <select id="trend-days" class="input-field font-mono text-xs py-1.5 w-24" onchange="loadTrends()">
                <option value="7">7天</option>
                <option value="14" selected>14天</option>
                <option value="30">30天</option>
            </select>
        </div>
    </div>

    <!-- 体重趋势 -->
    <div class="card">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <i data-lucide="scale" class="w-4 h-4 text-accent"></i>
                <h2 class="text-sm font-medium text-text-secondary">体重趋势</h2>
            </div>
            <button class="text-xs text-accent hover:underline" onclick="showWeightModal()">记录体重</button>
        </div>
        <div id="weight-chart" class="h-40 flex items-end gap-1 relative">
            <p class="text-text-muted text-sm w-full text-center self-center">暂无体重数据</p>
        </div>
        <div id="weight-list" class="mt-3 space-y-1"></div>
    </div>

    <!-- 每日喂养量 -->
    <div class="card">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="bar-chart-3" class="w-4 h-4 text-accent"></i>
            <h2 class="text-sm font-medium text-text-secondary">每日喂养量</h2>
            <span class="text-[10px] text-text-muted">(ml)</span>
        </div>
        <div id="feed-chart" class="h-40 relative">
            <p class="text-text-muted text-sm w-full text-center absolute inset-0 flex items-center justify-center">暂无数据</p>
        </div>
    </div>

    <!-- 喂养时段分布 -->
    <div class="card">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="clock" class="w-4 h-4 text-accent"></i>
            <h2 class="text-sm font-medium text-text-secondary">喂养时段分布</h2>
            <span class="text-[10px] text-text-muted">(次)</span>
        </div>
        <div id="hour-chart" class="h-32 flex items-end gap-px relative">
            <p class="text-text-muted text-sm w-full text-center self-center">暂无数据</p>
        </div>
        <div class="flex justify-between mt-1">
            <span class="text-[10px] text-text-muted">0时</span>
            <span class="text-[10px] text-text-muted">6时</span>
            <span class="text-[10px] text-text-muted">12时</span>
            <span class="text-[10px] text-text-muted">18时</span>
            <span class="text-[10px] text-text-muted">23时</span>
        </div>
    </div>

    <!-- 排泄趋势 -->
    <div class="card">
        <div class="flex items-center gap-2 mb-3">
            <i data-lucide="activity" class="w-4 h-4 text-accent"></i>
            <h2 class="text-sm font-medium text-text-secondary">排泄趋势</h2>
            <span class="text-[10px] text-text-muted">(次)</span>
        </div>
        <div id="excrete-chart" class="h-32 relative">
            <p class="text-text-muted text-sm w-full text-center absolute inset-0 flex items-center justify-center">暂无数据</p>
        </div>
        <div class="flex items-center gap-4 mt-2 text-xs">
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>排尿</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-400 inline-block"></span>排便</span>
        </div>
    </div>
</div>

<!-- 体重记录弹窗 -->
<div id="weight-modal" class="fixed inset-0 z-[90] hidden items-center justify-center bg-black/60">
    <div class="bg-surface border border-border rounded-xl p-6 w-80 max-w-[90vw]">
        <h3 class="text-sm font-medium text-text-secondary mb-3">记录体重</h3>
        <div class="space-y-3">
            <div>
                <label class="text-text-muted text-xs mb-1 block">体重 (kg)</label>
                <input type="number" id="weight-value" class="input-field font-mono" step="0.01" min="0.5" max="20" placeholder="3.50">
            </div>
            <div>
                <label class="text-text-muted text-xs mb-1 block">日期</label>
                <input type="date" id="weight-date" class="input-field font-mono">
            </div>
            <div>
                <label class="text-text-muted text-xs mb-1 block">备注</label>
                <input type="text" id="weight-note" class="input-field" placeholder="可选">
            </div>
        </div>
        <div class="flex gap-2 mt-4">
            <button class="btn-secondary flex-1 text-sm" onclick="closeWeightModal()">取消</button>
            <button class="btn-primary flex-1 text-sm" onclick="saveWeight()">保存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/trends.js"></script>
{% endblock %}
